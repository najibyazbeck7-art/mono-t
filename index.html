<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mycotech Hub - MONO-T</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-container">
    <header class="header">
        <div class="title-row">
            <h1>MONO-<span class="teal">T</span></h1>
            <span class="status-badge">OFFLINE</span>
        </div>
        <div class="action-row">
            <button class="btn-share">SHARE</button>
            <div class="settings-icon">⚙️</div>
        </div>
    </header>

    <div class="room-selector">
        <div class="room-name">Room 1 ▾</div>
        <div class="date">03 MAR 2026</div>
    </div>

    <div class="sensors-grid">
        <div class="sensor-card">
            <div class="card-top">
                <span class="sensor-label">AT</span>
                <span class="sensor-value">24 <small>C</small></span>
            </div>
            <div class="toggle-row">
                <div class="toggle-btn">ON</div>
                <div class="status-indicator"></div>
            </div>
            <div class="input-controls">
                <div class="input-group">
                    <label>min on</label>
                    <input type="text" placeholder="--">
                </div>
                <button class="btn-set">set</button>
                <div class="input-group">
                    <label>min off</label>
                    <input type="text" placeholder="--">
                </div>
            </div>
        </div>
        </div>

    <div class="control-settings-box">
        Control Settings Box
    </div>
</div>

</body>
</html>
