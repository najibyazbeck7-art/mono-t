<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thermo Beta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    
<div class="main-container">
    <div class="app-container">
        <!-- Header Section -->
        <div class="header">
            <h2>Thermo Beta</h2>
            <div class="header-controls">
                <span class="status-pill is-online" id="status-pill">ONLINE</span>
            </div>
        </div>

        <!-- Sensor Cards Container -->
        <div class="relay-container">
        
        <!-- AT Sensor Card -->
        <div class="relay-box" id="at-card">
            <div class="relay-label">
                <span class="sensor-label">AT</span>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="temp-value"><span id="at-val">--</span><small>C</small></span>
                    <span class="state-indicator" id="at-state">OFF</span>
                </div>
            </div>
            
            <div class="toggle-row">
                <button class="toggle-pill" id="at-btn" onclick="toggleRelay('at')">OFF</button>
                <div class="led-indicator" id="at-led"></div>
            </div>
            
            <div class="card-inputs">
                <div class="input-item">
                    <label>sec on</label>
                    <input type="text" id="at-min-on" placeholder="--">
                </div>
                <button class="btn-set" onclick="sendConfig('at')">SET</button>
                <div class="input-item">
                    <label>sec off</label>
                    <input type="text" id="at-min-off" placeholder="--">
                </div>
            </div>
            <div class="cycle-countdown" id="at-countdown"></div>
        </div>

        <!-- H1 Sensor Card -->
        <div class="relay-box" id="h1-card">
            <div class="relay-label">
                <span class="sensor-label">H1</span>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="temp-value"><span id="h1-val">--</span><small>C</small></span>
                    <span class="state-indicator" id="h1-state">OFF</span>
                </div>
            </div>
            
            <div class="toggle-row">
                <button class="toggle-pill" id="h1-btn" onclick="toggleRelay('h1')">OFF</button>
                <div class="led-indicator" id="h1-led"></div>
            </div>
            
            <div class="card-inputs">
                <div class="input-item">
                    <label>sec on</label>
                    <input type="text" id="h1-min-on" placeholder="--">
                </div>
                <button class="btn-set" onclick="sendConfig('h1')">SET</button>
                <div class="input-item">
                    <label>sec off</label>
                    <input type="text" id="h1-min-off" placeholder="--">
                </div>
            </div>
            <div class="cycle-countdown" id="h1-countdown"></div>
        </div>

        <!-- H2 Sensor Card -->
        <div class="relay-box" id="h2-card">
            <div class="relay-label">
                <span class="sensor-label">H2</span>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="temp-value"><span id="h2-val">--</span><small>C</small></span>
                    <span class="state-indicator" id="h2-state">OFF</span>
                </div>
            </div>
            
            <div class="toggle-row">
                <button class="toggle-pill" id="h2-btn" onclick="toggleRelay('h2')">OFF</button>
                <div class="led-indicator" id="h2-led"></div>
            </div>
            
            <div class="card-inputs">
                <div class="input-item">
                    <label>sec on</label>
                    <input type="text" id="h2-min-on" placeholder="--">
                </div>
                <button class="btn-set" onclick="sendConfig('h2')">SET</button>
                <div class="input-item">
                    <label>sec off</label>
                    <input type="text" id="h2-min-off" placeholder="--">
                </div>
            </div>
            <div class="cycle-countdown" id="h2-countdown"></div>
        </div>

        <!-- H3 Sensor Card -->
        <div class="relay-box" id="h3-card">
            <div class="relay-label">
                <span class="sensor-label">H3</span>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="temp-value"><span id="h3-val">--</span><small>C</small></span>
                    <span class="state-indicator" id="h3-state">OFF</span>
                </div>
            </div>
            
            <div class="toggle-row">
                <button class="toggle-pill" id="h3-btn" onclick="toggleRelay('h3')">OFF</button>
                <div class="led-indicator" id="h3-led"></div>
            </div>
            
            <div class="card-inputs">
                <div class="input-item">
                    <label>sec on</label>
                    <input type="text" id="h3-min-on" placeholder="--">
                </div>
                <button class="btn-set" onclick="sendConfig('h3')">SET</button>
                <div class="input-item">
                    <label>sec off</label>
                    <input type="text" id="h3-min-off" placeholder="--">
                </div>
            </div>
            <div class="cycle-countdown" id="h3-countdown"></div>
        </div>

        <!-- H4 Sensor Card -->
        <div class="relay-box" id="h4-card">
            <div class="relay-label">
                <span class="sensor-label">H4</span>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="temp-value"><span id="h4-val">--</span><small>C</small></span>
                    <span class="state-indicator" id="h4-state">OFF</span>
                </div>
            </div>
            
            <div class="toggle-row">
                <button class="toggle-pill" id="h4-btn" onclick="toggleRelay('h4')">OFF</button>
                <div class="led-indicator" id="h4-led"></div>
            </div>
            
            <div class="card-inputs">
                <div class="input-item">
                    <label>min on</label>
                    <input type="text" id="h4-min-on" placeholder="--">
                </div>
                <button class="btn-set" onclick="sendConfig('h4')">SET</button>
                <div class="input-item">
                    <label>min off</label>
                    <input type="text" id="h4-min-off" placeholder="--">
                </div>
            </div>
        </div>

        <!-- H5 Sensor Card -->
        <div class="relay-box" id="h5-card">
            <div class="relay-label">
                <span class="sensor-label">H5</span>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="temp-value"><span id="h5-val">--</span><small>C</small></span>
                    <span class="state-indicator" id="h5-state">OFF</span>
                </div>
            </div>
            
            <div class="toggle-row">
                <button class="toggle-pill" id="h5-btn" onclick="toggleRelay('h5')">OFF</button>
                <div class="led-indicator" id="h5-led"></div>
            </div>
            
            <div class="card-inputs">
                <div class="input-item">
                    <label>min on</label>
                    <input type="text" id="h5-min-on" placeholder="--">
                </div>
                <button class="btn-set" onclick="sendConfig('h5')">SET</button>
                <div class="input-item">
                    <label>min off</label>
                    <input type="text" id="h5-min-off" placeholder="--">
                </div>
            </div>
        </div>
    </div>
    
    <!-- Log Window -->
    <div class="log-section">
        <button class="log-toggle" onclick="toggleLog()">📋 Show/Hide Log</button>
        <div class="log-window" id="log-window" style="display: none;">
            <div class="log-header">
                <h3>MQTT Activity Log</h3>
                <button class="log-clear" onclick="clearLog()">Clear</button>
            </div>
            <div class="log-content" id="log-content"></div>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
