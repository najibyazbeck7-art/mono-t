<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mycotech Hub - MONO-T</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="header">
            <h2 id="main-title">MONO<span style="color:#3b82f6">T</span></h2>
            <div class="header-controls">
                <div id="status-bar" class="status-pill is-offline">CONNECTING...</div>
            </div>
        </div>

        <div class="action-row">
            <div class="action-group-left">
                <button id="install-pwa-btn" class="action-link" style="display: none;" onclick="installApp()">+ Install</button>
                <button id="share-btn" class="action-link" onclick="shareDashboard()">Share</button>
            </div>
            
            <button class="settings-btn" onclick="window.location.href='settings.html'">
                <svg class="gear-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"></path>
                    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"></path>
                </svg>
            </button>
        </div>

    <div class="room-selector">
        <div class="room-name">Room 1 ▾</div>
        <div class="date">03 MAR 2026</div>
    </div>

    <div class="sensors-grid">
        <div class="sensor-card">
            <div class="card-top">
                <span class="sensor-label">AT</span>
                <span class="sensor-value">24 <small>C</small></span>
            </div>
            <div class="toggle-row">
                <div class="toggle-btn">ON</div>
                <div class="status-indicator"></div>
            </div>
            <div class="input-controls">
                <div class="input-group">
                    <label>min on</label>
                    <input type="text" placeholder="--">
                </div>
                <button class="btn-set">set</button>
                <div class="input-group">
                    <label>min off</label>
                    <input type="text" placeholder="--">
                </div>
            </div>
        </div>
        </div>

    <div class="control-settings-box">
        Control Settings Box
    </div>
</div>

</body>
</html>
