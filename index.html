<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mycotech Hub - MONO-T</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="header">
            <h2 id="main-title">MONO<span style="color:#3b82f6">T</span></h2>
            <div class="header-controls">
                <div id="status-bar" class="status-pill is-offline">CONNECTING...</div>
            </div>
        </div>

    <div class="room-selector">
        <div class="room-name">Room 1 ▾</div>
        <div class="date">03 MAR 2026</div>
    </div>

    <div class="sensors-grid">
        <div class="sensor-card">
            <div class="card-top">
                <span class="sensor-label">AT</span>
                <span class="sensor-value">24 <small>C</small></span>
            </div>
            <div class="toggle-row">
                <div class="toggle-btn">ON</div>
                <div class="status-indicator"></div>
            </div>
            <div class="input-controls">
                <div class="input-group">
                    <label>min on</label>
                    <input type="text" placeholder="--">
                </div>
                <button class="btn-set">set</button>
                <div class="input-group">
                    <label>min off</label>
                    <input type="text" placeholder="--">
                </div>
            </div>
        </div>
        </div>

    <div class="control-settings-box">
        Control Settings Box
    </div>
</div>

</body>
</html>
